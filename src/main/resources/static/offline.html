<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Mode - Attendee</title>
    <!-- Outfit & Inter Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Stylesheet -->
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px border;
            border-color: rgba(255, 255, 255, 0.08);
        }
        .wifi-icon-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.07);
            margin-bottom: 24px;
        }
        .wifi-ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(239, 68, 68, 0.3);
            animation: ripple 2s infinite ease-in-out;
        }
        .wifi-ripple:nth-child(2) {
            animation-delay: 0.6s;
        }
        @keyframes ripple {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-100">
    <div class="max-w-md w-full glass-card rounded-3xl p-8 md:p-10 shadow-2xl flex flex-col items-center text-center animate-fade-in">
        
        <!-- App Logo Header -->
        <div class="flex flex-col items-center gap-3 mb-8">
            <img src="/image/logo.png" alt="Attendee Logo" class="w-20 h-20 md:w-24 md:h-24 object-contain rounded-2xl shadow-lg border-2 border-blue-50/10">
            <span class="text-xl font-black tracking-wider uppercase text-blue-400">Attendee</span>
        </div>

        <!-- Animated Disconnect Icon -->
        <div class="wifi-icon-container">
            <div class="wifi-ripple"></div>
            <div class="wifi-ripple"></div>
            <svg class="w-10 h-10 text-rose-500 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 5 5 0 011.414-3.536m0 0L5.636 5.636M12 12a1 1 0 100-2 1 1 0 000 2z"></path>
            </svg>
        </div>

        <!-- Headings -->
        <h1 class="text-2xl md:text-3xl font-black text-slate-50 tracking-tight mb-3">You are offline</h1>
        <p class="text-sm md:text-base text-slate-400 leading-relaxed font-medium mb-8">
            Attendee has lost connection to the server. Some live operations (like checking in via QR codes or submitting justifications) require a connection, but you can continue browsing your cached attendance histories.
        </p>

        <!-- Dynamic Reconnection Check Button -->
        <div class="w-full flex flex-col gap-3">
            <button onclick="checkConnectionAndReload()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-extrabold text-sm tracking-wide shadow-lg shadow-blue-900/30 hover:shadow-none hover:translate-y-0.5 transition-all duration-200 uppercase flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.283 8H18"></path>
                </svg>
                Retry Connection
            </button>
            <button onclick="window.history.back()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-extrabold text-sm tracking-wide shadow-lg hover:shadow-none hover:translate-y-0.5 transition-all duration-200 uppercase flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Continue Offline
            </button>
        </div>

        <!-- Status Indicator footer -->
        <div class="mt-8 flex items-center gap-2 text-xs font-bold text-slate-500 uppercase tracking-widest">
            <span class="w-2 h-2 rounded-full bg-slate-600 animate-ping"></span>
            Offline Shell Sandbox
        </div>
    </div>

    <script>
        function checkConnectionAndReload() {
            const btn = document.querySelector('button');
            const originalHtml = btn.innerHTML;

            // Render visual processing state on button
            btn.disabled = true;
            btn.innerHTML = `
                <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                Checking Link...
            `;

            // Perform ping check to see if back online
            if (navigator.onLine) {
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            } else {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                    
                    // Show soft toast notification if SweetAlert resides in fallback
                    alert("Still offline. Please check your Wi-Fi or mobile data network.");
                }, 1000);
            }
        }

        // Auto-check for online status transition
        window.addEventListener('online', () => {
            console.log('[Offline Sandbox] Device came back online! Initiating automatic recovery redirect...');
            window.location.reload();
        });
    </script>
</body>
</html>
