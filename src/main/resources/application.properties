spring.application.name=stuattendance
app.base-url=http://localhost:8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/stu_attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=attendee
spring.datasource.password=attendee

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Enable JPA Auditing
