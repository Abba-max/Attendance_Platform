spring.application.name=stuattendance
app.base-url=${APP_BASE_URL:https://localhost:8443}
server.address=0.0.0.0
server.port=${PORT:8443}
server.http.port=${HTTP_PORT:8080}

# SSL / HTTPS Configuration (self-signed cert for LAN camera access on mobile)
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=classpath:attendee-ssl.p12
server.ssl.key-store-password=attendee123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=attendee

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stu_attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:attendee}
spring.datasource.password=${DB_PASSWORD:attendee}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.open-in-view=true

# Hikari Connection Pool Optimization Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# Enable JPA Auditing
spring.main.allow-bean-definition-overriding=true

# File Upload Configuration (for justification documents)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true
file.upload-dir=uploads

