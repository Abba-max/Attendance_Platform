<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attendee – Login</title>

    <!-- Your existing Tailwind stylesheet -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <!-- Login-specific styles -->
    <link rel="stylesheet" th:href="@{/css/Login.css}" />
</head>
<body>

<div class="login-card">

    <!-- Teal → Gold accent bar -->
    <div class="card-accent"></div>

    <!-- Logo & branding -->
    <div class="logo-wrap">
        <img th:src="@{/image/logo.jpeg}" alt="Attendee Logo"  src=""/>
        <span class="brand-name">ATTENDEE</span>
        <span class="tagline" id="tagline">Smart Attendance Management</span>
    </div>

    <!-- Error message — shown on Spring Security login failure (?error) -->
    <div class="alert-error" id="errorMsg" th:if="${param.error}">
        Invalid username or password. Please try again.
    </div>

    <!-- Login form — posts to Spring Security's /login endpoint -->
    <form th:action="@{/login}" method="post">

        <!-- CSRF token (auto-injected by Thymeleaf + Spring Security) -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- Email / Username -->
        <div class="form-group">
            <label for="username" id="labelUsername">Email / Username</label>
            <div class="input-wrap">
                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="you@example.com"
                        autocomplete="username"
                        required />
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password" id="labelPassword">Password</label>
            <div class="input-wrap">
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required />
                <button
                        type="button"
                        class="toggle-pw"
                        id="toggleBtn"
                        onclick="togglePassword()"
                        aria-label="Show password">
                    👁
                </button>
            </div>
        </div>

        <!-- Remember me + Forgot password -->
        <div class="form-meta">
            <label>
                <input type="checkbox" name="remember-me" />
                <span id="rememberText">Remember me</span>
            </label>
            <a th:href="@{/forgot-password}" href="#" class="forgot-link" id="forgotLink">
                Forgot Password?
            </a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="btnLogin">Login</button>

    </form>

    <!-- Language switcher -->
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en', event)">EN</button>
        <button class="lang-btn"        data-lang="fr" onclick="setLang('fr', event)">FR</button>
    </div>

</div>

<!-- Login page scripts -->
<script th:src="@{/js/Login.js}"></script>

</body>
</html>
