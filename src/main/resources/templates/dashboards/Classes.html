<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes Management - Attendee</title>
    <link rel="stylesheet" th:href="@{/css/Classes.css}">
</head>
<body>
<div class="dashboard-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-circle">A</div>
            <h2>Attendee</h2>
        </div>
        <ul class="nav-links">
            <li><a th:href="@{/pedagog/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/pedagog/classes}" class="active">Classes Management</a></li>
            <li><a th:href="@{/pedagog/attendance}">Attendance</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1>Classes Management</h1>
            <div class="user-profile">
                <span>Admin Name</span>
                <div class="avatar">P</div>
            </div>
        </header>

        <section class="split-layout-container">

            <div class="list-column">
                <div class="toolbar">
                    <div class="search-bar">
                        <input type="text" id="classSearch" placeholder="Search classes...">
                    </div>
                </div>

                <div class="cards-grid">
                    <div class="class-card">
                        <div class="class-header">
                            <h3>Software Engineering 3</h3>
                            <span class="badge">SE-301</span>
                        </div>
                        <div class="class-body">
                            <p><strong>Teacher:</strong> Dr. Alan Turing</p>
                            <p><strong>Students:</strong> 45 Enrolled</p>
                        </div>
                        <div class="class-actions">
                            <button class="btn-outline">Edit</button>
                        </div>
                    </div>

                    <div class="class-card">
                        <div class="class-header">
                            <h3>Database Systems</h3>
                            <span class="badge">DB-202</span>
                        </div>
                        <div class="class-body">
                            <p><strong>Teacher:</strong> Prof. Ada Lovelace</p>
                            <p><strong>Students:</strong> 38 Enrolled</p>
                        </div>
                        <div class="class-actions">
                            <button class="btn-outline">Edit</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-column">
                <div class="form-card sticky-form">
                    <div class="section-header">
                        <h2>Add New Course</h2>
                    </div>

                    <form th:action="@{/pedagog/courses/save}" method="POST" id="createCourseForm" class="standard-form compact-form">
                        <div class="input-group">
                            <label for="courseName">Course Name *</label>
                            <input type="text" id="courseName" name="courseName" placeholder="e.g. Software Eng..." required>
                        </div>

                        <div class="input-group">
                            <label for="courseCode">Course Code *</label>
                            <input type="text" id="courseCode" name="courseCode" placeholder="e.g. SE-301" required>
                        </div>

                        <div class="input-group">
                            <label for="teacherId">Assign Teacher *</label>
                            <select id="teacherId" name="teacherId" required>
                                <option value="" disabled selected>Select a teacher...</option>
                                <option value="1">Dr. Alan Turing</option>
                                <option value="2">Prof. Ada Lovelace</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" rows="3" placeholder="Optional..."></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="reset" class="btn-secondary">Clear</button>
                            <button type="submit" class="btn-primary" id="submitBtn">Save Course</button>
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </main>
</div>

<script th:src="@{/Pedagogicassistant/Classes.js}"></script>
</body>
</html>
