<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Attendee</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="bg-slate-50 antialiased min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-200">
            <div class="flex items-center space-x-4">
                <div
                    class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-lg font-bold text-xl shadow-lg">
                    A</div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Admin Panel</h1>
            </div>
            <div class="flex items-center gap-4"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Institution Management -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-50">
                    <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-7h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                        Institutions
                    </h2>
                </div>
                <div class="p-6 flex-grow">
                    <form th:action="@{/admin/create-institution}" method="post" th:object="${institutionDto}"
                        class="space-y-4">
                        <div>
                            <label
                                class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Name</label>
                            <input type="text" th:field="*{name}" required placeholder="e.g. University of Science"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label
                                class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Location/Address</label>
                            <input type="text" th:field="*{address}" required placeholder="e.g. London, UK"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition outline-none">
                        </div>
                        <button type="submit"
                            class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2">
                            <span>Create Institution</span>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <script th:src="@{/js/admin/admin-dashboard.js}"></script>
</body>

</html>
