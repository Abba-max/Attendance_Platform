<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Attendee</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body class="bg-slate-50 antialiased min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-200">
            <div class="flex items-center space-x-4">
                <div
                    class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-lg font-bold text-xl shadow-lg">
                    A</div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Admin Panel</h1>
            </div>
            <div class="flex items-center gap-4"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Staff Management -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-50">
                    <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                        Staff Accounts
                    </h2>
                </div>
                <div class="p-6 flex-grow">
                    <form th:action="@{/admin/create-staff}" method="post" th:object="${staffDto}" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Full Name / Username</label>
                            <input type="text" th:field="*{username}" required placeholder="j.doe"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Email</label>
                            <input type="email" th:field="*{email}" required placeholder="staff@school.com"
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Initial Password</label>
                            <input type="password" th:field="*{password}" required
                                class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Assign Roles</label>
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <div th:each="role : ${roles}" th:if="${role.name != 'STUDENT'}" class="flex items-center p-2 bg-slate-50 rounded-lg border border-slate-100 hover:bg-white transition">
                                    <input type="checkbox" th:value="${role.name}" th:field="*{roleNames}" class="w-4 h-4 text-rose-600 rounded focus:ring-rose-500 border-slate-300">
                                    <label class="ml-2 text-xs font-medium text-slate-700" th:text="${role.name}"></label>
                                </div>
                            </div>
                        </div>
                        <button type="submit"
                            class="w-full py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-semibold rounded-lg shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2">
                            <span>Create Staff Account</span>
                            <
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <script th:src="@{/js/admin/admin-dashboard.js}"></script>
</body>

</html>
