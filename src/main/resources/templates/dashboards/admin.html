<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Attendee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-text">A</span>
                <h1>Admin Panel</h1>
            </div>
            <div class="header-right">
                <a th:href="@{/logout}" class="btn-secondary">Logout</a>
            </div>
        </header>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div class="admin-grid">
            <!-- Institution Management -->
            <div class="admin-card">
                <h2>Institutions</h2>
                <form th:action="@{/admin/create-institution}" method="post" th:object="${institutionDto}">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" required placeholder="University Name">
                    </div>
                    <div class="form-group">
                        <label>Location/Address</label>
                        <input type="text" th:field="*{address}" required placeholder="City, Country">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Create Institution</button>
                </form>
                <div class="entity-list">
                    <div th:each="inst : ${institutions}" class="entity-item">
                        <span th:text="${inst.name}"></span>
                        <span style="opacity: 0.5;" th:text="${inst.location}"></span>
                    </div>
                </div>
            </div>

            <!-- Classroom Management -->
            <div class="admin-card">
                <h2>Classrooms</h2>
                <form th:action="@{/admin/create-classroom}" method="post" th:object="${classroomDto}">
                    <div class="form-group">
                        <label>Institution</label>
                        <select th:field="*{institutionId}" required>
                            <option value="">Select Institution</option>
                            <option th:each="inst : ${institutions}" th:value="${inst.institutionId}"
                                th:text="${inst.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Field (e.g. Computer Science)</label>
                        <input type="text" th:field="*{field}" required>
                    </div>
                    <div class="form-group">
                        <label>Level (e.g. Master 1)</label>
                        <input type="text" th:field="*{level}" required>
                    </div>
                    <div class="form-group">
                        <label>Capacity</label>
                        <input type="number" th:field="*{capacity}" required min="1">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Create Classroom</button>
                </form>
                <div class="entity-list">
                    <div th:each="cls : ${classrooms}" class="entity-item">
                        <span th:text="${cls.field + ' (' + cls.level + ')'}"></span>
                        <span style="opacity: 0.5;" th:text="${cls.institution.name}"></span>
                    </div>
                </div>
            </div>

            <!-- Course Management -->
            <div class="admin-card">
                <h2>Courses</h2>
                <form th:action="@{/admin/create-course}" method="post" th:object="${courseDto}">
                    <div class="form-group">
                        <label>Classroom</label>
                        <select th:field="*{classroomId}" required>
                            <option value="">Select Classroom</option>
                            <option th:each="cls : ${classrooms}" th:value="${cls.classId}"
                                th:text="${cls.field + ' ' + cls.level}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" th:field="*{courseName}" required>
                    </div>
                    <div class="form-group">
                        <label>Credits</label>
                        <input type="number" th:field="*{credits}" required min="1">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Create Course</button>
                </form>
                <div class="entity-list">
                    <div th:each="crs : ${courses}" class="entity-item">
                        <span th:text="${crs.courseName}"></span>
                        <span style="opacity: 0.5;" th:text="${crs.classroom.field}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
