<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Attendee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden p-8 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Security Update</h1>
            <p class="text-slate-500">Please change your password to continue</p>
        </div>

        <div th:if="${error}" class="bg-red-50 text-red-600 p-4 rounded-xl text-sm border border-red-100 animate-pulse">
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/change-password}" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Current Password</label>
                <input type="password" name="currentPassword" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#00B0FF] focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                    placeholder="Enter current password">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">New Password</label>
                <input type="password" name="newPassword" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#00B0FF] focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                    placeholder="Enter new password">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Confirm New Password</label>
                <input type="password" name="confirmPassword" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#00B0FF] focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                    placeholder="Confirm new password">
            </div>

            <button type="submit" 
                class="w-full py-4 px-6 bg-[#00B0FF] hover:bg-[#009EE6] text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                Update Security Credentials
            </button>
        </form>

        <p class="text-center text-xs text-slate-400">
            For security reasons, your initial temporary password must be changed before accessing the dashboard.
        </p>
    </div>
</body>
</html>
