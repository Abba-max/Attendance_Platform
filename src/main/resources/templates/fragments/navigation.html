<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- SIDEBAR (Desktop >= 768px) -->
    <aside th:fragment="sidebar" id="sidebar"
        class="hidden md:flex flex-col w-72 h-screen fixed left-0 top-0 glass-panel border-r border-white/20 shadow-2xl z-[60] transition-all duration-300">
        <div class="p-8 border-b border-white/10">
            <div class="flex items-center gap-4">
                <img th:src="@{/image/logo.png}" alt="Logo" class="w-12 h-12 rounded-2xl shadow-lg border border-white/30">
                <div>
                    <span class="text-xl font-black text-slate-800 tracking-tighter block leading-none">ATTENDEE</span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest" th:text="${role ?: 'User Portal'}">Portal</span>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-6 space-y-2">
            <a th:href="@{/{role}/dashboard(role=${#strings.toLowerCase(role)})}" 
               class="nav-item active flex items-center gap-4 px-6 py-4 rounded-2xl transition-all duration-300 group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                <span class="font-bold">Home</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-blue-50 transition-all duration-300 group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="font-bold">Schedule</span>
            </a>
            <a href="#" class="nav-item flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-500 hover:bg-blue-50 transition-all duration-300 group">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <span class="font-bold">Notifications</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <form th:action="@{/logout}" method="POST">
                <button type="submit" class="w-full py-4 bg-rose-50 text-rose-600 rounded-2xl font-black text-sm hover:bg-rose-100 transition-all active:scale-95">
                    Sign Out
                </button>
            </form>
        </div>
    </aside>

    <!-- BOTTOM NAV (Mobile < 768px) -->
    <nav th:fragment="bottomNav" id="bottom-nav"
        class="md:hidden fixed bottom-6 left-6 right-6 h-20 glass-panel border border-white/30 shadow-2xl rounded-[2.5rem] flex items-center justify-around px-4 z-[60] backdrop-blur-3xl">
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-black uppercase">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-black uppercase tracking-tighter">Schedule</span>
        </a>
        <!-- Main Action (Center) -->
        <div class="relative -top-10">
            <button class="w-16 h-16 bg-[#00B0FF] rounded-full shadow-2xl shadow-blue-500/40 flex items-center justify-center text-white ring-8 ring-white/10 active:scale-90 transition-transform">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="text-[10px] font-black uppercase">Alerts</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 p-2 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-black uppercase">Profile</span>
        </a>
    </nav>

</body>
</html>
