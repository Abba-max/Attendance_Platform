<!--
    ═══════════════════════════════════════════════════════════════════
    FRAGMENT THYMELEAF — Section Migration Étudiants
    À insérer dans pedagog.html à l'endroit souhaité dans le dashboard

    1. Ajouter ce bloc dans le bon onglet/section de pedagog.html
    2. Ajouter à la fin du fichier (avant </body>) :
       <script th:src="@{/js/pedagog/migration-module.js}"></script>
    ═══════════════════════════════════════════════════════════════════
-->

<!-- ====== SECTION MIGRATION ====== -->
<div id="migration-section" class="space-y-4">
    <!--
        Le contenu est entièrement rendu par MigrationModule.init()
        via JavaScript. Ce div est le conteneur racine.

        L'indicateur de chargement ci-dessous est remplacé automatiquement.
    -->
    <div class="flex items-center justify-center py-16">
        <div class="text-center space-y-3">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent
                        rounded-full animate-spin mx-auto"></div>
            <p class="text-gray-500 text-sm">Chargement du module migration...</p>
        </div>
    </div>
</div>

<!--
    ═══════════════════════════════════════════════════════════════════
    EXEMPLE D'INTÉGRATION dans la barre de navigation du dashboard
    Ajouter un onglet/bouton dans la nav existante qui fait :
    ═══════════════════════════════════════════════════════════════════

    <button onclick="showSection('migration')"
        class="nav-btn flex items-center gap-2 px-4 py-2 rounded-lg
               text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-700 transition">
        <span>🏫</span>
        <span>Migration</span>
    </button>

    Et dans la logique de navigation JS (showSection) :
    document.getElementById('migration-section').classList.toggle('hidden', section !== 'migration');
-->
