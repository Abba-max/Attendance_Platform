<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="pwa-headers">
    <!-- PWA Integration Meta Tags -->
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Attendee">
    
    <!-- PWA Icons Mapping -->
    <link rel="apple-touch-icon" th:href="@{/image/logo-192x192.png}">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/image/logo-192x192.png}">
    <link rel="icon" type="image/png" sizes="512x512" th:href="@{/image/logo-512x512.png}">
    <link rel="shortcut icon" th:href="@{/image/logo.png}">
    <!-- Centralized PWA Manager Script -->
    <script th:src="@{/js/pwa.js}" defer></script>
</head>
</html>
