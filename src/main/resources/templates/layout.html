<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00B0FF">
    <title th:text="${title ?: 'Attendee'}">Attendee</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" th:href="@{/manifest.json}">
    <link rel="apple-touch-icon" th:href="@{/image/logo.png}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration for Glassmorphism -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    borderRadius: {
                        'premium': '2rem',
                    }
                }
            }
        }
    </script>
    
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body {
            overscroll-behavior-y: none;
        }
    </style>
</head>

<body class="font-sans antialiased bg-slate-50 text-slate-800 min-h-[100dvh]">

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- Navigation Fragments -->
        <div th:replace="~{fragments/navigation :: sidebar}"></div>
        <div th:replace="~{fragments/navigation :: bottomNav}"></div>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 md:ml-72 overflow-y-auto custom-scrollbar pb-32 md:pb-0">
            
            <!-- Header (Mobile Specific usually title, Desktop can use separate header) -->
            <header class="p-6 md:p-10 flex items-center justify-between">
                <div class="space-y-1">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight font-display" th:text="${pageTitle ?: 'Home'}">Home</h2>
                    <p class="text-slate-500 font-medium text-sm" th:text="${pageSubtitle ?: 'Welcome back to your workspace.'}">Welcome back.</p>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl glass-panel border border-white/40 flex items-center justify-center text-blue-500 shadow-sm relative">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="px-6 md:px-10 flex-1">
                <div th:replace="${content}">
                    <!-- Child page content injected here -->
                    <p>Placeholder Content</p>
                </div>
            </div>

        </main>
    </div>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered.'))
                    .catch(err => console.log('Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
