<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attendee – Login</title>


    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <link rel="stylesheet" th:href="@{/css/Login.css}" />
</head>
<body>

<div class="login-card">


    <div class="card-accent"></div>


    <div class="logo-wrap">
        <img th:src="@{/image/logo.jpeg}" alt="Attendee Logo" />
        <span class="brand-name">ATTENDEE</span>
        <span class="tagline" id="tagline">Smart Attendance Management</span>
    </div>


    <div class="alert-error" id="errorMsg" th:if="${param.error}">
        Invalid username or password. Please try again.
    </div>


    <form th:action="@{/login}" method="post">




        <div class="form-group">
            <label for="username" id="labelUsername">Email / Username</label>
            <div class="input-wrap">
                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="you@example.com"
                        autocomplete="username"
                        required />
            </div>
        </div>


        <div class="form-group">
            <label for="password" id="labelPassword">Password</label>
            <div class="input-wrap">
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required />
                <button
                        type="button"
                        class="toggle-pw"
                        id="toggleBtn"
                        onclick="togglePassword()"
                        aria-label="Show password">
                    👁
                </button>
            </div>
        </div>


        <div class="form-meta">
            <label>
                <input type="checkbox" name="remember-me" />
                <span id="rememberText">Remember me</span>
            </label>
            <a th:href="@{/forgot-password}" href="#" class="forgot-link" id="forgotLink">
                Forgot Password?
            </a>
        </div>


        <button type="submit" class="btn-login" id="btnLogin">Login</button>

    </form>


    <div class="lang-bar">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en', event)">EN</button>
        <button class="lang-btn"        data-lang="fr" onclick="setLang('fr', event)">FR</button>
    </div>

</div>


<script th:src="@{/js/Login.js}"></script>

</body>
</html>
