# ===================================================================
# Production Profile Configuration
# ===================================================================

# Disable Devtools LiveReload and Restart for maximum performance
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Disable SSL in production (Render handles SSL at the load balancer)
server.ssl.enabled=false

# Enable Thymeleaf template engine caching
spring.thymeleaf.cache=true

# Static resource caching (1 Year for browsers, enable caching chain)
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.cache=true
# Content fingerprinting: appends a hash to filenames so browsers can cache indefinitely
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**/*.js,/**/*.css,/**/*.png,/**/*.jpg,/**/*.svg,/**/*.woff2

# Response Gzip Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024

# ─── HikariCP Production Tuning ─────────────────────────────────────────────
# Render free tier has limited RAM; 8 connections is sufficient for burst load.
# keepalive-time prevents Aiven MySQL from dropping idle connections (default 60s).
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# ─── Caffeine In-Memory Cache ────────────────────────────────────────────────
spring.cache.type=caffeine

# Optimized Logging Level in Production
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.group3.en.stuattendance=WARN

# ─── App Base URL for Emails ────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:https://two5-26-inge-3-isi-en-group3-attendance.onrender.com/}
